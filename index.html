  /* ————— Resilient React loader —————
     Load React + ReactDOM, trying a second CDN if the first is blocked,
     then run the inlined app bundle and mount. The bundle itself never
     touches React until render, so load order can't crash it. */
  (function () {
    var CDNS = [
      { react: "https://unpkg.com/react@18/umd/react.production.min.js",
        dom:   "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" },
      { react: "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
        dom:   "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" }
    ];
    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var el = document.createElement("script");
        el.src = src; el.crossOrigin = "anonymous";
        el.onload = resolve; el.onerror = function () { reject(new Error("failed: " + src)); };
        document.head.appendChild(el);
      });
    }
    function fail(msg) {
      var boot = document.getElementById("boot");
      if (boot) boot.innerHTML = '<div class="k">The hearth could not be lit — the React libraries did not load.<br><br>' +
        'If you are offline or behind a strict firewall, host the two React files alongside this page, or try again on a connection that permits unpkg.com / jsdelivr.net.<br><br>' +
        '<span style="font-size:13px;opacity:.7">' + (msg || "") + '</span></div>';
    }
    function loadPair(i) {
      if (i >= CDNS.length) return Promise.reject(new Error("all CDNs blocked"));
      return loadScript(CDNS[i].react)
        .then(function () { return loadScript(CDNS[i].dom); })
        .then(function () {
          if (!(window.React && window.ReactDOM)) throw new Error("libraries loaded but not defined");
        })
        .catch(function (e) { return loadPair(i + 1); });
    }
    window.__bootGrimoire = function () {
      if (!(window.React && window.ReactDOM && window.RowansGrimoire)) return;
      var root = window.ReactDOM.createRoot(document.getElementById("root"));
      root.render(window.React.createElement(window.RowansGrimoire));
    };
    loadPair(0).then(function () { window.__reactReady = true; window.__bootGrimoire(); })
               .catch(function (e) { fail(e && e.message); });
  })();
